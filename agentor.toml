[project]
name = "agentor"
root = "."

[agent]
runner = "claude"
model = "claude-opus-4-7"
max_attempts = 3
pool_size = 0   # meta project — manual gating: bump with [+] to dispatch
context_window = 1_000_000
single_phase = false
test_cmd = "python3 -m unittest discover tests"

[git]
base_branch = "main"
branch_prefix = "agent/"
merge_mode = "merge"

[review]
port = 7777
notify = true
